# Minimal single-node config. rpc_secret is deliberately NOT set here or via
# GARAGE_RPC_SECRET — see bzync-entrypoint.sh for why (Garage requires it be
# 32 bytes of hex, which conflicts with Bzync Cloud's generic "changeme"
# seed-time secret generator, so it's generated fresh on every container
# start instead).
db_engine = "sqlite"
metadata_dir = "/data/meta"
data_dir = "/data/data"

# No peers ever join on this tier — --single-node (see bzync-entrypoint.sh)
# configures the cluster layout automatically on first start. This is set
# for clarity and because the config schema expects it regardless.
replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"
rpc_secret_file = "/etc/garage-rpc-secret"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
# No root_domain: path-style requests only (bucket-in-path, e.g.
# /my-bucket/key) — vhost-style (bucket.subdomain) needs DNS this tier
# doesn't set up. Every S3 SDK supports path-style; see README.

[admin]
api_bind_addr = "[::]:3903"
# admin_token / metrics_token: GARAGE_ADMIN_TOKEN / GARAGE_METRICS_TOKEN env vars
